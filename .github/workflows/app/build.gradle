plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ragequit.game'
    compileSdk 37

    defaultConfig {
        applicationId 'com.ragequit.game'
        minSdk 24
        targetSdk 37
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles(
                getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro'
            )
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
